{% extends 'base.html' %}
{% block title %}Nouveau mot de passe — BookNest{% endblock %}

{% block content %}
<div style="max-width:450px; margin:2rem auto;">
    <h1 class="page-title">Nouveau mot de passe</h1>
    <div class="card">
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div class="form-group">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div class="form-errors">{{ field.errors }}</div>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary" style="width:100%;">Réinitialiser mon mot de passe</button>
        </form>
    </div>
</div>
{% endblock %}
